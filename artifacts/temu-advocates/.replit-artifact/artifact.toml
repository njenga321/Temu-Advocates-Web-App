kind = "web"
previewPath = "/"
title = "Temu Advocates"
version = "1.0.0"
id = "artifacts/temu-advocates"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20906

[services.development]
run = "pnpm --filter @workspace/temu-advocates run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/temu-advocates", "run", "build" ]
publicDir = "artifacts/temu-advocates/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20906"
BASE_PATH = "/"
